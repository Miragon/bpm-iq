# yaml-language-server: $schema=../../schemas/process.schema.json
# Process metadata — schema reference: docs/process-metadata.md
# Replace every <placeholder>. Every landscape reference must resolve — `scripts/validate.ts` checks.
# Only Identity, Purpose, Ownership, and Structure are required; add optional blocks
# (operations, decisions, risks, automation, mining, …) when you are ready to maintain them.

# Identity ─────────────────────────────────────────────────────────
id: <process-id>                 # kebab-case, must equal the directory name
name: <Process Name>
classification: core             # core | support | management
level: 2                         # 2 = end-to-end, 3 = sub-process
version: 0.1.0
status: draft                    # draft | to-be | as-is | deprecated
last_reviewed: <YYYY-MM-DD>      # for a draft: the scaffold date
review_cycle_months: 12

# Purpose ──────────────────────────────────────────────────────────
purpose: >
  <Why does this process exist? What value does it deliver, and to whom?>
trigger: <What starts the process?>
outcome: <What state does the process guarantee at the end?>

# Ownership (→ landscape/team-topology.tt) ─────────────────────────
owner:
  team: <team-id>                # node id in landscape/team-topology.tt
  role: Process Owner
participants: []                 # other involved teams:
# - team: <team-id>
#   interaction: x-as-a-service  # collaboration | x-as-a-service | facilitating

# Strategic context ────────────────────────────────────────────────
value_chain:                     # REQUIRED for classification: core (element ids)
  steps:
    - <step-id>
# supports:                      # REQUIRED for classification: support — what it enables:
#   - <step-id-or-process-id>
wardley:                         # → landscape/wardley-map.owm (component display names)
  components:
    - <Component Name>

# Operations ───────────────────────────────────────────────────────
kpis:
  - name: <KPI name>
    target: "<target>"
    direction: lower-is-better   # lower-is-better | higher-is-better | target-band
    source: <system/report that produces the number>
#   measured_from: <bpmn-element-id>
#   measured_to: <bpmn-element-id>
#   actuals:
#     - date: <YYYY-MM-DD>
#       value: "<measured value>"
# operations:
#   volume: { cases_per_period: <n>, period: month, as_of: <YYYY-MM-DD>, source: <source> }
#   cost: { per_case: "<amount>", as_of: <YYYY-MM-DD> }
systems:
  - name: <System>
    role: <What role does it play in this process?>
inputs:
  - <Input>
outputs:
  - <Output>

# Structure ────────────────────────────────────────────────────────
models:
  bpmn: <process-id>.bpmn
subprocesses: []
# - id: <subprocess-id>
#   name: <Subprocess Name>
#   file: subprocesses/<subprocess-id>.bpmn
decisions: []
# - id: <decision-id>
#   name: <Decision question?>
#   file: decisions/<decision-id>.dmn
#   used_by: <bpmn-element-id>
docs:
  - docs/overview.md             # per-task work instructions: docs/tasks/<bpmn-element-id>.md

# Relationships ────────────────────────────────────────────────────
related_processes: []
# - id: <process-id>
#   relationship: upstream       # upstream | downstream | supporting | escalation
#   note: <Why are they related?>
exceptions: []
# - name: <What can go wrong?>
#   handling: <How is it handled? Must appear in the BPMN model.>
#   frequency: "<share of cases (as of YYYY-MM)>"

# Risk & compliance (optional) ─────────────────────────────────────
# risks:
#   - name: <risk>
#     impact: medium             # low | medium | high
#     mitigated_by: <control name>
# controls:
#   - name: <control name>
#     type: preventive           # preventive | detective
#     element: <bpmn-element-id>
#     requirement: <policy / norm reference>

# Automation (optional, → docs/automation.md) ──────────────────────
# automation:
#   status: candidate            # candidate | in-development | live
#   engine: camunda-8            # camunda-7 | camunda-8 | other
#   model: <process-id>.executable.bpmn
#   note: <scope and rationale>

# Process mining connection (optional) ─────────────────────────────
# mining:
#   case_id: { name: <business key>, system: <system> }
#   events:
#     - activity: <bpmn-element-id>
#       system: <system>
#       event: <event name in the log>
#   no_digital_trace:
#     - <bpmn-element-id>

# Governance (→ docs/governance.md) ────────────────────────────────
# approval:                      # REQUIRED once status is as-is
#   approved_by: <role/person>
#   date: <YYYY-MM-DD>
#   version: <must equal version above>
history:
  - version: 0.1.0
    date: <YYYY-MM-DD>
    change: Initial scaffold
    changed_by: <team-id>
# published: []                  # where exports are deployed:
# - location: <where the exported skill lives>
#   date: <YYYY-MM-DD>
#   contact: <who to notify on changes>
