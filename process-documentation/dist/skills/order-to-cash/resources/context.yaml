# Operations ───────────────────────────────────────────────────────
kpis:
  - name: Order cycle time (order received → payment recorded)
    target: "< 5 business days"
    direction: lower-is-better
    source: ERP report OTC-01  # source-organization system; not part of this snapshot
    measured_from: StartEvent_order_received  # element in process.bpmn
    measured_to: EndEvent_order_fulfilled     # element in process.bpmn
    actuals:
      - date: 2026-06-30
        value: "6.2 business days"
  - name: First-pass yield (orders fulfilled without manual rework)
    target: "> 95%"
    direction: higher-is-better
    source: ERP report OTC-02  # source-organization system; not part of this snapshot
  - name: Days sales outstanding (DSO)
    target: "< 30 days"
    direction: lower-is-better
    source: Finance dashboard  # source-organization system; not part of this snapshot
operations:
  volume:
    cases_per_period: 1400
    period: month
    as_of: 2026-06-30
    source: ERP report OTC-01
  cost:
    per_case: "≈ 18 EUR"
    as_of: 2026-06-30
systems:
  - name: ERP
    role: System of record for orders, inventory, and invoices
  - name: Payment gateway
    role: Processes incoming payments (outsourced commodity)
inputs:
  - Confirmed customer order
outputs:
  - Fulfilled shipment
  - Paid invoice

# Structure (paths relative to this skill package's resources/) ────
models:
  bpmn: process.bpmn
subprocesses:
  - id: invoice-handling
    name: Invoice Handling
    file: subprocesses/invoice-handling.bpmn
decisions:
  - id: credit-check
    name: Credit approved?
    file: decisions/credit-check.dmn
    used_by: Gateway_credit_approved  # gateway in process.bpmn
docs:
  - docs/overview.md

# Relationships ────────────────────────────────────────────────────
related_processes:
  - id: customer-onboarding
    relationship: upstream
    note: >-
      New customers must be onboarded (master data, credit terms) before their
      first order.
    modeled: false  # not modeled in the source repository
exceptions:
  - name: Credit check fails
    handling: >-
      Order is rejected; customer is notified with the reason and alternatives
      (prepayment).
    frequency: "~4% of orders (as of 2026-06)"
  - name: Payment not received within terms
    handling: >-
      A timer on "Await payment" (Invoice Handling) triggers a payment reminder
      when terms expire; the loop repeats until payment is recorded.
    frequency: "~11% of invoices (as of 2026-06)"

# Risk & compliance ────────────────────────────────────────────────
risks:
  - name: Revenue loss from uncollectible orders
    impact: high
    mitigated_by: Credit check before fulfillment
controls:
  - name: Credit check before fulfillment
    type: preventive
    element: Task_check_credit  # element in process.bpmn
    requirement: Internal credit policy CP-7  # the rules are in decisions/credit-check.dmn
    decision: decisions/credit-check.dmn

# Automation ───────────────────────────────────────────────────────
automation:
  status: candidate
  note: >
    Dunning is the first candidate: "Send payment reminder" is manual work on a
    commodity capability (Payment Processing). The automation path is documented
    in the source repository (docs/automation.md there — not included in this
    snapshot).

