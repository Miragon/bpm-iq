name: Sync starter

# Mirrors starter/ into Miragon/process-documentation-starter so the
# "Use this template" repo never drifts from the monorepo source of truth.
# The starter is the minimal content-repo contract: bpmiq.yml + a processes
# folder + README (no build, no dependencies).
# Requires the release-please GitHub App installed on the starter repo with
# Contents write (and Workflows write if the template later ships workflows).

on:
  push:
    branches: [main]
    paths:
      - "starter/**"
      - ".github/workflows/sync-starter.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-starter
  cancel-in-progress: true

jobs:
  sync:
    name: Push starter/ to the starter repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          owner: Miragon
          repositories: process-documentation-starter

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Miragon/process-documentation-starter
          token: ${{ steps.app-token.outputs.token }}
          path: starter-repo

      - name: Mirror the starter into the template repo
        run: rsync -a --delete --exclude ".git" starter/ starter-repo/

      - name: Verify the mirrored starter is complete
        working-directory: starter-repo
        run: |
          # the contract essentials must survive the mirror
          for f in bpmiq.yml README.md LICENSE; do
            test -f "$f" || { echo "::error::starter is missing $f"; exit 1; }
          done
          # bpmiq.yml must name a processes folder that exists and holds BPMN
          grep -E "^processes: *[A-Za-z0-9._/-]+$" bpmiq.yml || { echo "::error::bpmiq.yml has no processes key"; exit 1; }
          dir=$(grep -E "^processes:" bpmiq.yml | sed -E "s/^processes: *//")
          test -d "$dir" || { echo "::error::processes folder '$dir' missing"; exit 1; }
          ls "$dir"/*.bpmn >/dev/null 2>&1 || { echo "::error::no .bpmn files in '$dir'"; exit 1; }
          echo "starter verified (bpmiq.yml → $dir)"

      - name: Commit and push
        working-directory: starter-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Starter already up to date."
            exit 0
          fi
          git commit -m "chore: sync from bpm-iq@${GITHUB_SHA::7}"
          git push
