name: Release Please

# Single whole-repo release: one Release PR, one vX.Y.Z tag, one CHANGELOG.
# The bump propagates in lockstep to validator, mcp and live-host (extra-files
# in release-please-config.json). On merge:
#   - validator + mcp are published to npm (publish jobs below)
#   - the vX.Y.Z tag triggers release.yml to build the GHCR live-host image
#
# Authenticates with a GitHub App token, NOT GITHUB_TOKEN: the default token
# cannot trigger further workflows, so the Release PR (and the tag it pushes)
# would sit with no CI and never publish / build the image.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # live-host image: no job here — release-please pushes the vX.Y.Z tag with the
  # app token, which triggers release.yml to build the GHCR image.

  publish-validator:
    needs: release-please
    if: ${{ needs.release-please.outputs.released == 'true' }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-npm.yml
    with:
      package: validator

  publish-mcp:
    needs: release-please
    if: ${{ needs.release-please.outputs.released == 'true' }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-npm.yml
    with:
      package: mcp
