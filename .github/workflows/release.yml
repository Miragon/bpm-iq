name: Release (GHCR image)

# The ONE live-host artifact (ADR 0004): on-prem installs, the bpm-live Fly app
# and every SaaS cell run this exact image.
#   push to main   → ghcr.io/miragon/bpmiq-live-host:sha-<full-sha> + :edge
#   tag v*         → additionally :vX.Y.Z, :vX.Y and :latest
# The v* tag is cut by release-please (single whole-repo release; see
# release-please.yml). The sha- tag uses the FULL commit sha so a submodule pin
# maps to its image deterministically (`git rev-parse HEAD`, no short-sha
# ambiguity).

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  live-host-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # arm64 via QEMU: on-prem hosts are often Apple Silicon / Graviton
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ghcr.io/miragon/bpmiq-live-host
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=edge,enable={{is_default_branch}}
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/live-host/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
