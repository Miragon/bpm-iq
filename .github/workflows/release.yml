name: Release (GHCR image)

# The ONE live-host artifact (ADR 0004): on-prem installs, the bpm-live Fly app
# and every SaaS cell run this exact image.
#   push to main   → ghcr.io/miragon/bpmiq-live-host:sha-<full-sha> + :edge
#   tag v*         → additionally :vX.Y.Z, :vX.Y and :latest
# The v* tag is cut by release-please (single whole-repo release; see
# release-please.yml). The sha- tag uses the FULL commit sha so a submodule pin
# maps to its image deterministically (`git rev-parse HEAD`, no short-sha
# ambiguity).

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  live-host-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # arm64 via QEMU: on-prem hosts are often Apple Silicon / Graviton
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ghcr.io/miragon/bpmiq-live-host
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=edge,enable={{is_default_branch}}
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/live-host/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
