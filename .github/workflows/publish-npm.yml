name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - validator
          - mcp
  workflow_call:
    inputs:
      package:
        description: "Package to publish (validator | mcp)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Build (tsdown → dist/)
        run: pnpm --filter @bpmiq/${{ inputs.package }} build
      - name: Sanity-run the built validator against the example content repo
        if: inputs.package == 'validator'
        run: node packages/validator/dist/validate.js --root process-documentation
      - name: Sanity-run the built MCP server (must boot, then exit 0 on stdin EOF)
        if: inputs.package == 'mcp'
        run: timeout 30 node packages/mcp/dist/server.js --root process-documentation < /dev/null
      - name: Publish with provenance (skip if version already on the registry)
        run: |
          name="$(node -p "require('./packages/${{ inputs.package }}/package.json').name")"
          version="$(node -p "require('./packages/${{ inputs.package }}/package.json').version")"
          if npm view "$name@$version" version > /dev/null 2>&1; then
            echo "$name@$version already published — skipping"
          else
            pnpm --filter "$name" publish --access public --no-git-checks --provenance
          fi
