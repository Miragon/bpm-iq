name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pin-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Miragon/pin-npm-dependencies@58fe24377aef66748a1444ff69ab05e3f938a798 # v1.2.1

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint (eslint — errors fail; warnings are the ratchet)
        run: pnpm lint
      - name: Architecture rules (dependency-cruiser — layer/topology boundaries)
        run: pnpm arch
      - name: Format check (prettier)
        run: pnpm format:check
      - name: Typecheck all packages (type stripping runs untyped otherwise)
        run: pnpm typecheck
      - name: Validate the example content repo (bpmiq.yml discovery + BPMN structure/DI)
        run: pnpm validate
      - name: Tests (notations, validator, web sync merge, live-host release flow)
        run: pnpm test
      - name: Build (web app — a Vite break must not first surface in the Fly image)
        run: pnpm build
      - name: No stale pre-monorepo paths in docs or code
        # The b190944 restructure (collab/ → apps/, integrations/ → packages/) left
        # docs pointing at dead paths once — this keeps that class of drift out for good.
        run: |
          if git grep -nE "collab/|integrations/mcp" -- ':!*.lock' ':!node_modules' ':!.github/workflows/validate.yml'; then
            echo "::error::stale pre-monorepo path references found (collab/ or integrations/mcp)"
            exit 1
          fi
