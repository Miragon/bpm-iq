packages:
  - "apps/*"
  - "apps/*/ui"
  - "packages/*"
  # process-documentation is example CONTENT (bpmiq.yml + .bpmn), not a package
# postinstall build scripts pnpm may run (blocked by default for security)
allowBuilds:
  esbuild: true
  inferno: false
minimumReleaseAgeExclude:
  - "@bpmiq/validator@0.1.0"
